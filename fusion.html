<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Security Terminal - File Recovery</title>

    <style>
        /* ========= FUENTES DE ALTA CALIDAD ========= */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Orbitron:wght@600;700;900&display=swap');

        /* --- CONFIGURACIÓN BASE --- */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #060205;
            background-image:
                radial-gradient(circle at center, rgba(18, 4, 15, 0.9) 0%, #060205 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 100%, 100% 4px;
            font-family: 'Fira Code', monospace;
            color: #00ffcc;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MATRIX CANVAS BACKGROUND --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.18;
        }

        /* --- EFECTO CRT Y SCANLINES GLOBAL --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
            animation: crtFlicker 0.15s infinite;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .terminal-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 3;
        }

        /* --- EFECTO SCANLINE DE BARRIDO --- */
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(255, 0, 60, 0) 0%, rgba(255, 0, 60, 0.04) 50%, rgba(255, 0, 60, 0) 100%);
            z-index: 2;
            pointer-events: none;
            animation: scan-down 10s infinite linear;
        }

        /* ========= VENTANA DE LA TERMINAL CENTRAL ========= */
        .terminal {
            width: 100%;
            max-width: 780px;
            background: rgba(10, 1, 4, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid #ff1111;
            box-shadow: 0 0 30px rgba(255, 17, 17, 0.25), inset 0 0 15px rgba(255, 17, 17, 0.15);
            border-radius: 12px;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
            animation: borderPulse 6s infinite ease-in-out;
        }

        /* Barra superior de la ventana */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 17, 17, 0.25);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff3333;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        .btn.yellow {
            background: #ffaa00;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.6);
        }

        .btn.green {
            background: #00ff66;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #ffaa00;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 170, 0, 0.3);
        }

        .status-pill {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            background: rgba(255, 17, 17, 0.15);
            color: #ff3333;
            border: 1px solid rgba(255, 17, 17, 0.4);
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: statusPulse 1.5s infinite alternate ease-in-out;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #ff3333;
            border-radius: 50%;
        }

        /* ========= TITULO DE ALERTA ========= */
        .glitch-alert {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            text-align: center;
            color: #ff1111;
            letter-spacing: 3px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255, 17, 17, 0.4);
            animation: soft-blink 1.5s infinite alternate ease-in-out;
        }

        /* ========= CALAVERA ASCII CON GLITCH ========= */
        .skull-container {
            text-align: center;
            width: 100%;
            overflow: hidden;
        }

        .ascii-skull {
            display: inline-block;
            text-align: left;
            font-family: 'Fira Code', monospace;
            font-size: min(11px, 2.5vw);
            /* Fluid responsive font sizing */
            line-height: 1.25;
            color: #ff3333;
            margin: 10px auto;
            font-weight: 700;
            background: transparent;
            border: none;
            padding: 0;
            text-shadow: 0 0 6px rgba(255, 51, 51, 0.4);
            white-space: pre;
            user-select: none;
            animation: skullGlitch 3.5s infinite alternate ease-in-out;
        }

        /* ========= LOGS DE LA TERMINAL ========= */
        .terminal-body {
            max-height: 280px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.7;
            color: #00ff66;
            padding-right: 8px;
            box-sizing: border-box;

            /* Scrollbar personalizado */
            scrollbar-width: thin;
            scrollbar-color: #00ff66 rgba(10, 1, 4, 0.5);
        }

        .terminal-body::-webkit-scrollbar {
            width: 6px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: rgba(10, 1, 4, 0.5);
            border-radius: 3px;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background-color: #00ff66;
            border-radius: 3px;
            box-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
        }

        .log-line {
            margin: 6px 0;
            opacity: 0;
            transform: translateY(4px);
            animation: fadeInUp 0.25s forwards ease-out;
            letter-spacing: -0.2px;
            word-wrap: break-word;
            word-break: break-word;
        }

        .log-line.danger {
            color: #ff3333;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.2);
        }

        .log-line.warning {
            color: #ffaa00;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(255, 170, 0, 0.2);
        }

        .log-line.success-text {
            color: #00ff66;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.3);
        }

        .log-line.file-name-text {
            color: #00e5ff;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.3);
        }

        .file-name {
            text-decoration: underline;
            color: #ffffff;
            background: rgba(0, 229, 255, 0.15);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- CONTENEDOR Y BOTÓN VER ARCHIVO RECUPERADO --- */
        .button-container {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px 0;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s 0.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recovery-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 255, 102, 0.08);
            border: 2px solid #00ff66;
            color: #00ff66;
            padding: 14px 32px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Brillo sutil que recorre el botón */
        .recovery-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.15) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: rotate(25deg);
            transition: all 0.5s ease;
            pointer-events: none;
            animation: shineSweep 4s infinite linear;
        }

        .recovery-button:hover {
            background: #00ff66;
            color: #060205;
            box-shadow: 0 0 35px rgba(0, 255, 102, 0.8);
            transform: translateY(-3px);
        }

        .recovery-button:hover .btn-icon {
            transform: translateY(-1px) scale(1.05);
        }

        .recovery-button:active {
            transform: translateY(1px);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.5);
        }

        .btn-icon {
            transition: transform 0.2s ease;
        }

        /* Cursor parpadeante */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff66;
            animation: cursorBlink 0.8s infinite;
            vertical-align: middle;
            margin-left: 6px;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.7);
        }

        /* ========= ANIMACIONES ========= */
        @keyframes borderPulse {

            0%,
            100% {
                border-color: #ff1111;
                box-shadow: 0 0 25px rgba(255, 17, 17, 0.25), inset 0 0 15px rgba(255, 17, 17, 0.15);
            }

            50% {
                border-color: #ff3355;
                box-shadow: 0 0 35px rgba(255, 51, 85, 0.35), inset 0 0 20px rgba(255, 51, 85, 0.2);
            }
        }

        @keyframes statusPulse {
            0% {
                opacity: 0.7;
                background: rgba(255, 17, 17, 0.1);
            }

            100% {
                opacity: 1;
                background: rgba(255, 17, 17, 0.25);
                box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
            }
        }

        @keyframes soft-blink {

            0%,
            100% {
                opacity: 0.85;
                text-shadow: 0 0 8px rgba(255, 17, 17, 0.4);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 18px rgba(255, 17, 17, 0.8), 0 0 30px rgba(255, 17, 17, 0.4);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cursorBlink {
            50% {
                opacity: 0;
            }
        }

        @keyframes scan-down {
            0% {
                top: -15%;
            }

            100% {
                top: 115%;
            }
        }

        @keyframes crtFlicker {

            0%,
            100% {
                opacity: 0.99;
            }

            50% {
                opacity: 1.0;
            }
        }

        @keyframes shineSweep {
            0% {
                left: -60%;
            }

            20%,
            100% {
                left: 140%;
            }
        }

        @keyframes skullGlitch {

            0%,
            100% {
                transform: skew(0deg);
                text-shadow: 0 0 6px rgba(255, 51, 51, 0.4);
            }

            92% {
                transform: skew(0deg);
                color: #ff3333;
                text-shadow: 0 0 6px rgba(255, 51, 51, 0.4);
            }

            93% {
                transform: skew(6deg) scaleY(0.95);
                color: #00ffcc;
                text-shadow: -2px 0 red, 2px 0 blue;
            }

            94% {
                transform: skew(-6deg) scaleY(1.05);
                color: #ffaa00;
                text-shadow: 2px 0 red, -2px 0 blue;
            }

            95% {
                transform: skew(0deg);
                text-shadow: 0 0 6px rgba(255, 51, 51, 0.4);
            }
        }

        /* ========= RESPONSIVIDAD PARA CELULARES ========= */
        @media (max-width: 768px) {

            body,
            html {
                height: auto;
                min-height: 100%;
            }

            .terminal-container {
                padding: 12px;
                align-items: flex-start;
                padding-top: 20px;
                padding-bottom: 40px;
            }

            .terminal {
                padding: 16px 14px;
                border-width: 1.5px;
            }

            .glitch-alert {
                font-size: 20px;
                letter-spacing: 2px;
                margin: 8px 0;
            }

            .terminal-body {
                max-height: 250px;
                font-size: 13px;
                line-height: 1.6;
            }

            .recovery-button {
                padding: 12px 24px;
                font-size: 13px;
                width: 100%;
                box-sizing: border-box;
            }

            .status-pill {
                padding: 1px 6px;
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            .glitch-alert {
                font-size: 16px;
                letter-spacing: 1px;
            }

            .terminal-body {
                max-height: 210px;
                font-size: 12px;
            }

            .title {
                font-size: 11px;
                letter-spacing: 1px;
            }

            .btn {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>

<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="terminal-container">
        <div class="scanline-overlay"></div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="buttons">
                    <div class="btn"></div>
                    <div class="btn yellow"></div>
                    <div class="btn green"></div>
                </div>
                <div class="title">ATAQUE_RANSOMWARE</div>
                <div class="status-pill">
                    <span class="status-dot"></span>
                    <span>ALERTA</span>
                </div>
            </div>

            <div class="glitch-alert">[ CITT: Ciberseguridad ]</div>

            <div class="skull-container">
                <pre class="ascii-skull">
    .---.
   /     \
  \_o_o_/
   )   (
  //__\\
 //     \\
\\======//
 '------'
[ R A N S O M W A R E ]</pre>
            </div>

            <div class="terminal-body" id="terminalBody"></div>
        </div>
    </div>

    <script>
        // === 1. FONDO DE LLUVIA MATRIX (CANVAS) ===
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "0101100101ABCDEF💀SYSTEM☠️VULNERADO🔴ERROR⚠️RANSOMWARE";
        const charArr = chars.split("");
        const fontSize = 13;
        let columns = canvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        // Ajustar columnas al redimensionar la ventana
        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            const prevLength = rainDrops.length;
            const newLength = Math.floor(columns);
            if (newLength > prevLength) {
                const extension = Array(newLength - prevLength).fill(1);
                rainDrops = rainDrops.concat(extension);
            }
        });

        function drawMatrix() {
            ctx.fillStyle = 'rgba(6, 2, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = charArr[Math.floor(Math.random() * charArr.length)];

                // Mezcla de colores verde neón y rojo cyber para el fondo
                if (Math.random() > 0.96) {
                    ctx.fillStyle = '#ff3333'; // Algunos caracteres rojos
                } else {
                    ctx.fillStyle = '#00ff66'; // Mayoría verdes
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // === 2. IMPRESIÓN DE LOGS EN TERMINAL ===
        const logs = [
            { text: "Buscando fallos de seguridad en la red...", type: "normal" },
            { text: "[ERROR HUMANO] Un usuario abrió un correo falso.", type: "warning" },
            { text: "Descargando archivo malicioso oculto: 'Afiche_CITT.pdf'...", type: "normal" },
            { text: "Vulnerabilidad encontrada: El equipo no tenía las actualizaciones al día.", type: "warning" },
            { text: "Acceso concedido al atacante. Descifrando contraseña débil...", type: "normal" },
            { text: "Robo de datos iniciado: Copiando correos, contactos y contraseñas...", type: "normal" },
            { text: "Comenzando el secuestro de información (Cifrado Ransomware)...", type: "warning" },
            { text: "Bloqueando acceso a: Carpeta 'Mis Documentos'... ¡COMPLETO!", type: "danger" },
            { text: "Bloqueando acceso a: Fotos, Contabilidad y Bases de Datos... ¡COMPLETO!", type: "danger" },
            { text: "Desactivando el Antivirus del sistema... ÉXITO.", type: "warning" },
            { text: "[CRÍTICO] TODO EL SISTEMA HA SIDO BLOQUEADO.", type: "danger" },
            { text: "Mensaje del Atacante: 'Paga 1.5 Bitcoins para recuperar tus archivos'.", type: "warning" },
            { text: "MENSAJE DE CONCIENTIZACIÓN: Un solo clic puede abrir la puerta equivocada. Protege tus datos.", type: "normal" },
            { text: "La seguridad es tarea de todos. ¿Estás seguro de que estás protegido?", type: "danger" }
        ];

        const terminalBody = document.getElementById("terminalBody");
        let currentLine = 0;

        // Elemento cursor dinámico reutilizable
        const cursorSpan = document.createElement("span");
        cursorSpan.classList.add("cursor");

        function printLog() {
            if (currentLine < logs.length) {
                let lineData = logs[currentLine];
                let div = document.createElement("div");
                div.classList.add("log-line");

                if (lineData.type === "danger") div.classList.add("danger");
                if (lineData.type === "warning") div.classList.add("warning");

                div.innerHTML = `> ${lineData.text}`;
                terminalBody.appendChild(div);

                // Mueve el cursor parpadeante al final de esta línea
                div.appendChild(cursorSpan);

                terminalBody.scrollTop = terminalBody.scrollHeight;
                currentLine++;

                // Velocidad de impresión simulada dinámica
                let delay = 500 + Math.random() * 400;
                if (lineData.type === "danger") delay = 1000;

                setTimeout(printLog, delay);
            } else {
                // Al terminar la lista de logs, iniciamos la descarga simulada
                setTimeout(startDownloadSequence, 1200);
            }
        }

        function startDownloadSequence() {
            // Remueve el cursor del log final para reubicarlo
            if (cursorSpan.parentNode) {
                cursorSpan.parentNode.removeChild(cursorSpan);
            }

            // 1. Mostrar "Iniciando descarga"
            let divInit = document.createElement("div");
            divInit.classList.add("log-line", "warning");
            divInit.innerHTML = "> Iniciando descarga";
            terminalBody.appendChild(divInit);
            divInit.appendChild(cursorSpan);
            terminalBody.scrollTop = terminalBody.scrollHeight;

            // 2. Crear la barra de progreso
            setTimeout(() => {
                let divBar = document.createElement("div");
                divBar.classList.add("log-line");
                terminalBody.appendChild(divBar);
                terminalBody.scrollTop = terminalBody.scrollHeight;

                let totalSquares = 20;
                let currentProgress = 0;

                let interval = setInterval(() => {
                    currentProgress += 5; // Aumentar en 5% cada paso
                    let filledCount = Math.round((currentProgress / 100) * totalSquares);
                    let emptyCount = totalSquares - filledCount;

                    // Construcción de la barra de cuadraditos
                    let barString = "■".repeat(filledCount) + "□".repeat(emptyCount);

                    divBar.innerHTML = `> [${barString}] ${currentProgress}%`;
                    divBar.appendChild(cursorSpan);
                    terminalBody.scrollTop = terminalBody.scrollHeight;

                    if (currentProgress >= 100) {
                        clearInterval(interval);
                        // Remover cursor de la barra
                        if (cursorSpan.parentNode) {
                            cursorSpan.parentNode.removeChild(cursorSpan);
                        }
                        showFileRecoveryButton();
                    }
                }, 100); // 100ms * 20 pasos = ~2 segundos de animación
            }, 800);
        }

        function showFileRecoveryButton() {
            setTimeout(() => {
                // Mensaje de éxito
                let divComplete = document.createElement("div");
                divComplete.classList.add("log-line", "success-text");
                divComplete.innerHTML = "> Descarga completa. Archivo recuperado.";
                terminalBody.appendChild(divComplete);
                terminalBody.scrollTop = terminalBody.scrollHeight;

                // Mensaje con nombre de archivo PDF
                setTimeout(() => {
                    let divFile = document.createElement("div");
                    divFile.classList.add("log-line", "file-name-text");
                    divFile.innerHTML = `> Archivo listo: <span class="file-name">afiche_CITT.pdf</span>`;
                    terminalBody.appendChild(divFile);
                    terminalBody.scrollTop = terminalBody.scrollHeight;

                    // Agregar botón verde de recuperación
                    setTimeout(() => {
                        let divBtnContainer = document.createElement("div");
                        divBtnContainer.classList.add("button-container");
                        divBtnContainer.innerHTML = `
                            <a href="afiche_CITT.pdf" target="_blank" class="recovery-button">
                                <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="12" y1="18" x2="12" y2="12"></line>
                                    <polyline points="9 15 12 18 15 15"></polyline>
                                </svg>
                                <span>ver archivo recuperado</span>
                            </a>
                        `;
                        terminalBody.appendChild(divBtnContainer);

                        // Crear una línea vacía al final para mantener el cursor de consola parpadeando
                        let divEnd = document.createElement("div");
                        divEnd.classList.add("log-line");
                        divEnd.innerHTML = "> ";
                        divEnd.appendChild(cursorSpan);
                        terminalBody.appendChild(divEnd);

                        terminalBody.scrollTop = terminalBody.scrollHeight;
                    }, 800);
                }, 600);
            }, 500);
        }

        // Iniciar secuencia de impresión
        setTimeout(printLog, 600);
    </script>
</body>

</html>
